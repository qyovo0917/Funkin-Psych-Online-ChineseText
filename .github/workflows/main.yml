name: Build

on:
  push:
    branches: [ main, experimental ]
    tags: [ "*" ]
  pull_request:
    branches: [ main, experimental ]
  workflow_dispatch:

jobs:
  buildLinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Cache Haxelib & HXCPP
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            export/release/linux/haxe
            export/release/linux/obj
            export/release/linux/cpp
          key: linux-${{ hashFiles('haxelib.json', 'Project.xml') }}-${{ github.sha }}
          restore-keys: |
            linux-${{ hashFiles('haxelib.json', 'Project.xml') }}-

      - name: Install Dependencies
        run: |
          sudo apt-get install libvlc-dev libvlccore-dev -y
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Create Version
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: haxelib run lime build Project.xml linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linuxBuild
          path: export/release/linux/bin

  buildWindows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Cache Haxelib & HXCPP
        uses: actions/cache@v4
        with:
          path: |
            C:/haxelib
            export/release/windows/haxe
            export/release/windows/obj
            export/release/windows/cpp
          key: win-${{ hashFiles('haxelib.json', 'Project.xml') }}-${{ github.sha }}
          restore-keys: |
            win-${{ hashFiles('haxelib.json', 'Project.xml') }}-

      - name: Install Dependencies
        run: |
          haxelib setup C:/haxelib
          haxelib install hmm --quiet
          haxelib run hmm install
        shell: cmd

      - name: Create Version
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: haxelib run lime build windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windowsBuild
          path: export/release/windows/bin

  buildMac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Cache Haxelib & HXCPP
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            export/release/macos/haxe
            export/release/macos/obj
            export/release/macos/cpp
          key: mac-${{ hashFiles('haxelib.json', 'Project.xml') }}-${{ github.sha }}
          restore-keys: |
            mac-${{ hashFiles('haxelib.json', 'Project.xml') }}-

      - name: Install Dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Create Version
        run: echo "${{github.run_id}}" > VERSION

      - name: Compile
        run: arch -x86_64 haxelib run lime build mac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macBuild
          path: export/release/macos/bin

  release:
    if: github.ref_type == 'tag'
    needs: [buildLinux, buildMac, buildWindows]
    runs-on: ubuntu-latest
    steps:
      - name: Create Draft Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: v${{ github.ref_name }}
          draft: true
          prerelease: false

      - uses: actions/download-artifact@v4
      - name: Zip
        run: |
          zip -r windowsBuild.zip windowsBuild/
          zip -r linuxBuild.zip linuxBuild/
          zip -r macBuild.zip macBuild/

      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: windowsBuild.zip
          asset_name: windowsBuild.zip
          asset_content_type: application/zip
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: linuxBuild.zip
          asset_name: linuxBuild.zip
          asset_content_type: application/zip
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: macBuild.zip
          asset_name: macBuild.zip
          asset_content_type: application/zip

      - name: Push Windows Build
        uses: actions/checkout@v3
        with:
          repository: Snirozu/Funkin-Psych-Online-Builds
          ref: windows
          token: ${{ secrets.BUILDS_GITHUB_TOKEN }}
          path: builds_repo
      - run: |
          cd builds_repo
          cp -rf ../windowsBuild/* ./
          git add .
          git commit -m "${{github.run_id}}"
          git push --force

      - name: Push Linux Build
        uses: actions/checkout@v3
        with:
          repository: Snirozu/Funkin-Psych-Online-Builds
          ref: linux
          token: ${{ secrets.BUILDS_GITHUB_TOKEN }}
          path: builds_repo
      - run: |
          cd builds_repo
          cp -rf ../linuxBuild/* ./
          git add .
          git commit -m "${{github.run_id}}"
          git push --force

      - name: Push MacOS Build
        uses: actions/checkout@v3
        with:
          repository: Snirozu/Funkin-Psych-Online-Builds
          ref: macos
          token: ${{ secrets.BUILDS_GITHUB_TOKEN }}
          path: builds_repo
      - run: |
          cd builds_repo
          cp -rf ../macBuild/* ./
          git add .
          git commit -m "${{github.run_id}}"
          git push --force
